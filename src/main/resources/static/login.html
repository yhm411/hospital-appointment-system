<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>医疗预约系统 - 登录</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gradient-to-br from-blue-500 to-cyan-400 min-h-screen flex items-center justify-center p-4">

    <div class="glass-card w-full max-w-md p-8 rounded-2xl">
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-100 text-blue-600 rounded-full mb-4">
                <i class="fa-solid fa-hospital-user text-3xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">医疗预约系统</h1>
            <p class="text-gray-500 mt-2">请登录您的账户以继续</p>
        </div>

        <form onsubmit="handleLogin(event)" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">用户名</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                        <i class="fa-solid fa-user"></i>
                    </span>
                    <input type="text" id="username" required
                        class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 text-sm"
                        placeholder="请输入用户名">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">密码</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                        <i class="fa-solid fa-lock"></i>
                    </span>
                    <input type="password" id="password" required
                        class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 text-sm"
                        placeholder="请输入密码">
                </div>
            </div>

            <div id="errorMsg" class="text-red-500 text-sm hidden text-center"></div>

            <button type="submit" id="loginBtn"
                class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors">
                <span>立即登录</span>
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-gray-100 text-center">
            <p class="text-xs text-gray-400">© 2026 医疗预约系统 · 版权所有</p>
        </div>
    </div>

    <script src="common.js"></script>
    <script>
        async function handleLogin(event) {
            event.preventDefault();
            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;
            const errorMsg = document.getElementById("errorMsg");
            const loginBtn = document.getElementById("loginBtn");

            errorMsg.classList.add("hidden");
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="fa-solid fa-circle-notch animate-spin mr-2"></i>登录中...';

            try {
                const user = await common.fetch("/api/users/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password })
                });

                localStorage.setItem("user", JSON.stringify(user));

                if (user.role === "ADMIN") {
                    window.location.href = "admin.html";
                } else if (user.role === "DOCTOR") {
                    window.location.href = "doctor.html";
                } else {
                    window.location.href = "user.html";
                }
            } catch (e) {
                errorMsg.innerText = "用户名或密码错误";
                errorMsg.classList.remove("hidden");
                loginBtn.disabled = false;
                loginBtn.innerHTML = "立即登录";
            }
        }

        // Check if already logged in
        document.addEventListener("DOMContentLoaded", () => {
            const user = common.getLoggedInUser();
            if (user) {
                if (user.role === "ADMIN") window.location.href = "admin.html";
                else if (user.role === "DOCTOR") window.location.href = "doctor.html";
                else window.location.href = "user.html";
            }
        });
    </script>
</body>
</html>
